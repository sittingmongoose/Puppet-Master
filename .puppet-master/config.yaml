project:
  name: Untitled
  working_directory: .
tiers:
  phase:
    platform: claude
    model: opus
    task_failure_style: skip_retries
    max_iterations: 3
    escalation: null
  task:
    platform: codex
    model: gpt-4o
    task_failure_style: spawn_new_agent
    max_iterations: 5
    escalation: phase
  subtask:
    platform: cursor
    model: sonnet
    task_failure_style: spawn_new_agent
    max_iterations: 10
    escalation: task
  iteration:
    platform: cursor
    model: auto
    plan_mode: true
    task_failure_style: skip_retries
    max_attempts: 3
    escalation: subtask
models:
  level1:
    platform: claude
    model: haiku
  level2:
    platform: claude
    model: sonnet
  level3:
    platform: claude
    model: opus
complexity_routing:
  trivial:
    feature: level1
    bugfix: level1
    refactor: level1
    test: level1
    docs: level1
  simple:
    feature: level1
    bugfix: level2
    refactor: level1
    test: level1
    docs: level1
  standard:
    feature: level2
    bugfix: level2
    refactor: level2
    test: level2
    docs: level1
  critical:
    feature: level3
    bugfix: level3
    refactor: level3
    test: level2
    docs: level2
branching:
  base_branch: main
  naming_pattern: ralph/{phase}/{task}
  granularity: per-task
  push_policy: per-subtask
  merge_policy: squash
  auto_pr: true
verification:
  browser_adapter: dev-browser
  screenshot_on_failure: true
  evidence_directory: .puppet-master/evidence
memory:
  progress_file: progress.txt
  agents_file: AGENTS.md
  prd_file: .puppet-master/prd.json
  multi_level_agents: true
  agents_enforcement:
    require_update_on_failure: true
    require_update_on_gotcha: true
    gate_fails_on_missing_update: true
    reviewer_must_acknowledge: true
    auto_promote_patterns: false
    enforce_gate_agents_update: false
budgets:
  claude:
    max_calls_per_run: 5
    max_calls_per_hour: 3
    max_calls_per_day: 10
    cooldown_hours: 5
    fallback_platform: codex
  codex:
    max_calls_per_run: 50
    max_calls_per_hour: 20
    max_calls_per_day: 100
    fallback_platform: cursor
  cursor:
    max_calls_per_run: unlimited
    max_calls_per_hour: unlimited
    max_calls_per_day: unlimited
    fallback_platform: null
  gemini:
    max_calls_per_run: 100
    max_calls_per_hour: unlimited
    max_calls_per_day: unlimited
    fallback_platform: copilot
  copilot:
    max_calls_per_run: unlimited
    max_calls_per_hour: unlimited
    max_calls_per_day: unlimited
    fallback_platform: gemini
budget_enforcement:
  on_limit_reached: fallback
  warn_at_percentage: 80
  notify_on_fallback: true
  soft_limit_percent: 80
  hard_limit_percent: 100
rate_limits:
  cursor:
    calls_per_minute: 20
    cooldown_ms: 5000
  codex:
    calls_per_minute: 10
    cooldown_ms: 10000
  claude:
    calls_per_minute: 30
    cooldown_ms: 3000
  gemini:
    calls_per_minute: 50
    cooldown_ms: 2000
  copilot:
    calls_per_minute: 40
    cooldown_ms: 2500
logging:
  level: info
  retention_days: 30
  intensive: false
cli_paths:
  cursor: cursor-agent
  codex: codex
  claude: claude
  gemini: gemini
  copilot: copilot
execution:
  kill_agent_on_failure: true
checkpointing:
  enabled: true
  interval: 10
  max_checkpoints: 10
  checkpoint_on_subtask_complete: true
  checkpoint_on_shutdown: true
loop_guard:
  enabled: true
  max_repetitions: 3
  suppress_reply_relay: true
