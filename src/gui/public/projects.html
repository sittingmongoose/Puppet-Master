<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Inline script to prevent dark mode flash -->
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="alternate icon" href="/favicon.ico">
  <title>RWM Puppet Master - Select Project</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="header-content">
      <div class="header-left">
        <a href="/" class="logo-link">
          <h1 class="logo">RWM Puppet Master</h1>
        </a>
        <nav class="main-navigation">
          <a href="/" class="nav-link" data-page="dashboard">DASHBOARD</a>
          <a href="/projects" class="nav-link active" data-page="projects">PROJECTS</a>
          <a href="/wizard" class="nav-link" data-page="wizard">WIZARD</a>
          <a href="/config" class="nav-link" data-page="config">CONFIG</a>
          <a href="/doctor" class="nav-link" data-page="doctor">DOCTOR</a>
          <a href="/tiers" class="nav-link" data-page="tiers">TIERS</a>
          <a href="/evidence" class="nav-link" data-page="evidence">EVIDENCE</a>
          <a href="/history" class="nav-link" data-page="history">HISTORY</a>
        </nav>
      </div>
      <div class="header-right">
        <div class="header-actions">
          <button class="icon-btn" id="dark-mode-toggle" aria-label="Toggle dark mode">
            <svg class="dark-mode-icon moon-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <svg class="dark-mode-icon sun-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <!-- Title Panel -->
    <section class="panel">
      <h1 class="page-title">Select Project</h1>
    </section>
    
    <!-- Project Cards Grid -->
    <section class="panel">
      <h2 class="panel-title" aria-label="Available projects">Projects</h2>
      <div id="project-cards-grid" class="project-cards-grid">
        <!-- Project cards will be dynamically inserted -->
        <div class="loading-indicator" id="loading-indicator">Loading projects...</div>
      </div>
    </section>
    
    <!-- Recent Projects Table -->
    <section class="panel">
      <div class="panel-header">
        <h2 class="panel-title" aria-label="Recent projects list">Recent Projects</h2>
        <button class="icon-btn" id="refresh-projects-btn" aria-label="Refresh projects">REFRESH</button>
      </div>
      <table class="projects-table" id="projects-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Path</th>
            <th>Status</th>
            <th>Last Updated</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="projects-table-body">
          <tr>
            <td colspan="5" class="table-empty">Loading projects...</td>
          </tr>
        </tbody>
      </table>
    </section>
    
    <!-- Create Project Panel -->
    <section class="panel">
      <h2 class="panel-title">Create New Project</h2>
      <form id="create-project-form" class="create-project-form">
        <div class="form-row">
          <label for="project-name-input">Project Name:</label>
          <input type="text" id="project-name-input" required 
                 placeholder="My Project" aria-label="Project name" />
        </div>
        <div class="form-row">
          <label for="project-path-input">Project Path:</label>
          <input type="text" id="project-path-input" required 
                 placeholder="/path/to/project" aria-label="Project path" />
        </div>
        <div class="form-actions">
          <button type="submit" class="control-btn start-btn" id="create-project-btn">CREATE PROJECT</button>
          <button type="button" class="icon-btn" id="browse-path-btn" aria-label="Browse for directory path">BROWSE</button>
          <input type="file" id="directory-input" webkitdirectory directory style="display: none;" aria-label="Select directory">
        </div>
        <div id="create-project-error" class="form-error" style="display: none;"></div>
      </form>
    </section>
  </main>

  <script src="/js/navigation.js"></script>
  <script type="module" src="/js/projects.js"></script>
</body>
</html>
