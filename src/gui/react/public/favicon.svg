<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#0047AB" stroke="#00F0FF" stroke-width="1.5"/>
  
  <!-- Gear icon with puppet strings -->
  <!-- Main gear body -->
  <g transform="translate(16,16)">
    <!-- Center hole -->
    <circle cx="0" cy="0" r="3" fill="#1A1A1A"/>
    
    <!-- Gear teeth (8 teeth) -->
    <g stroke="#00F0FF" stroke-width="1.5" fill="#0047AB" stroke-linejoin="round">
      <!-- Top -->
      <path d="M -1 -10 L 1 -10 L 1.5 -12 L -1.5 -12 Z"/>
      <!-- Bottom -->
      <path d="M -1 10 L 1 10 L 1.5 12 L -1.5 12 Z"/>
      <!-- Left -->
      <path d="M -10 -1 L -10 1 L -12 1.5 L -12 -1.5 Z"/>
      <!-- Right -->
      <path d="M 10 -1 L 10 1 L 12 1.5 L 12 -1.5 Z"/>
      <!-- Top-right diagonal -->
      <path d="M 7 -7 L 9 -9 L 10.5 -8 L 8.5 -6 Z"/>
      <!-- Top-left diagonal -->
      <path d="M -7 -7 L -9 -9 L -10.5 -8 L -8.5 -6 Z"/>
      <!-- Bottom-right diagonal -->
      <path d="M 7 7 L 9 9 L 8.5 10.5 L 6 8.5 Z"/>
      <!-- Bottom-left diagonal -->
      <path d="M -7 7 L -9 9 L -8.5 10.5 L -6 8.5 Z"/>
    </g>
    
    <!-- Inner gear structure -->
    <circle cx="0" cy="0" r="6" fill="none" stroke="#00F0FF" stroke-width="1"/>
    
    <!-- Puppet strings (4 diagonal lines suggesting control) -->
    <g stroke="#00FF41" stroke-width="1.5" stroke-linecap="round" opacity="0.8">
      <line x1="-8" y1="-8" x2="-14" y2="-14"/>
      <line x1="8" y1="-8" x2="14" y2="-14"/>
      <line x1="-8" y1="8" x2="-14" y2="14"/>
      <line x1="8" y1="8" x2="14" y2="14"/>
    </g>
  </g>
</svg>
