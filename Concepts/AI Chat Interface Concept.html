<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #d4d0c8;
            color: #000000;
            padding: 10px;
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 300px 1fr;
            grid-template-rows: auto 1fr;
            gap: 10px;
            height: calc(100vh - 20px);
        }

        /* Top Control Bar - Spans both columns */
        .control-bar {
            grid-column: 1 / -1;
            background-color: #d4d0c8;
            border: 3px solid #000000;
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: flex-end;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 5px;
        }

        .control-group.platform-model {
            margin-left: 40px;
        }

        .control-group.attach {
            margin-left: 60px;
        }

        .control-label {
            font-weight: bold;
            font-size: 13px;
            color: #000000;
        }

        .mode-btn {
            background-color: #d4d0c8;
            border: 3px solid #000000;
            padding: 6px 15px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.1s ease;
            color: #000000;
            box-shadow: 2px 2px 0px #000000;
            height: 36px;
        }

        .mode-btn:hover {
            background-color: #e8e4dc;
        }

        .mode-btn.active {
            background-color: #00ff00;
            border: 3px solid #000000;
            color: #000000;
        }

        select {
            background-color: #d4d0c8;
            border: 3px solid #000000;
            padding: 6px 12px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            min-width: 200px;
            color: #000000;
            box-shadow: 2px 2px 0px #000000;
            height: 36px;
        }

        select option {
            background-color: #ffffff;
            color: #000000;
        }

        select:hover {
            background-color: #f0f0f0;
        }

        select:focus {
            outline: none;
            border: 3px solid #00ff00;
        }

        .crew-toggle {
            background-color: #d4d0c8;
            border: 3px solid #000000;
            padding: 6px 15px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.1s ease;
            color: #000000;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 2px 2px 0px #000000;
            height: 36px;
        }

        .crew-toggle:hover {
            background-color: #e8e4dc;
        }

        .crew-toggle.active {
            background-color: #00ff00;
        }

        .attach-btn {
            background-color: #d4d0c8;
            border: 3px solid #000000;
            padding: 6px 15px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.1s ease;
            color: #000000;
            box-shadow: 2px 2px 0px #000000;
            height: 36px;
        }

        .attach-btn:hover {
            background-color: #e8e4dc;
        }

        /* Left Sidebar - History */
        .sidebar {
            background-color: #d4d0c8;
            border: 3px solid #000000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            background-color: #d4d0c8;
            border-bottom: 3px solid #000000;
            padding: 15px;
        }

        .sidebar-title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 10px;
            color: #000000;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-item {
            background-color: #d4d0c8;
            border: 3px solid #000000;
            padding: 8px 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.1s ease;
            color: #000000;
            box-shadow: 2px 2px 0px #000000;
        }

        .chat-item:hover {
            background-color: #c0bcb4;
        }

        .chat-item.active {
            background-color: #00ff00;
            border: 3px solid #000000;
        }

        .chat-timestamp {
            font-size: 10px;
            color: #666;
            margin-top: 4px;
        }

        /* Right Main Area - Chat */
        .main-area {
            background-color: #d4d0c8;
            border: 3px solid #000000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background-color: #d4d0c8;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .message-header {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 11px;
            color: #000000;
        }

        .message-content {
            background-color: #ffffff;
            border: 3px solid #000000;
            padding: 15px;
            color: #000000;
            line-height: 1.6;
            box-shadow: 2px 2px 0px #000000;
        }

        .message.user .message-content {
            background-color: #e8e4dc;
        }

        .message.assistant .message-content {
            background-color: #ffffff;
        }

        /* Input Area */
        .input-area {
            background-color: #d4d0c8;
            border-top: 3px solid #000000;
            padding: 15px;
        }

        .input-wrapper {
            display: flex;
            flex-direction: row;
            gap: 10px;
            align-items: stretch;
        }

        textarea {
            background-color: #d4d0c8;
            border: 3px solid #000000;
            padding: 12px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 13px;
            resize: none;
            flex: 1;
            color: #000000;
            transition: all 0.1s ease;
            height: 50px;
            box-shadow: 2px 2px 0px #000000;
        }

        textarea:focus {
            outline: none;
            border: 3px solid #00ff00;
        }

        textarea::placeholder {
            color: #999999;
        }

        .input-controls {
            display: flex;
            justify-content: flex-end;
            align-items: stretch;
            gap: 10px;
        }

        .send-btn {
            background-color: #00ff00;
            border: 3px solid #000000;
            padding: 0 30px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.1s ease;
            color: #000000;
            height: 50px;
            box-shadow: 2px 2px 0px #000000;
        }

        .send-btn:hover {
            background-color: #33ff33;
        }

        .send-btn:active {
            background-color: #00cc00;
        }

        .send-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 16px;
        }

        ::-webkit-scrollbar-track {
            background: #d4d0c8;
            border: 2px solid #000000;
        }

        ::-webkit-scrollbar-thumb {
            background: #808080;
            border: 2px solid #000000;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #606060;
        }

        /* Modal for file attachments */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: #d4d0c8;
            border: 3px solid #000000;
            padding: 25px;
            max-width: 500px;
            width: 90%;
        }

        .modal-header {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 15px;
            border-bottom: 3px solid #000000;
            padding-bottom: 10px;
            color: #000000;
        }

        .modal-body {
            margin: 15px 0;
        }

        .file-list {
            border: 3px solid #000000;
            background-color: #ffffff;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        .file-item {
            padding: 8px;
            border-bottom: 2px solid #d4d0c8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #000000;
        }

        .remove-file {
            background-color: #ff0000;
            border: 2px solid #000000;
            padding: 4px 8px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 10px;
            cursor: pointer;
            color: #ffffff;
            font-weight: bold;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 15px;
        }

        .modal-btn {
            background-color: #d4d0c8;
            border: 3px solid #000000;
            padding: 10px 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
            color: #000000;
        }

        .modal-btn.primary {
            background-color: #00ff00;
            color: #000000;
        }

        input[type="file"] {
            display: none;
        }

        .file-upload-label {
            background-color: #d4d0c8;
            border: 3px solid #000000;
            padding: 10px 15px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
            display: inline-block;
            margin-bottom: 10px;
            color: #000000;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Top Control Bar -->
        <div class="control-bar">
            <div class="control-group">
                <span class="control-label">MODE:</span>
                <div style="display: flex; gap: 10px;">
                    <button class="mode-btn active" onclick="setMode('plan', this)">Plan</button>
                    <button class="mode-btn" onclick="setMode('brainstorm', this)">BrainStorm</button>
                    <button class="crew-toggle active" onclick="toggleCrew(this)" id="crewToggle">
                        Crew
                    </button>
                </div>
            </div>
            
            <div class="control-group platform-model">
                <span class="control-label">PLATFORM:</span>
                <select id="platformSelect" onchange="updateModels()">
                    <option value="gemini" selected>▼ Gemini</option>
                    <option value="cursor">▼ Cursor</option>
                    <option value="claude">▼ Claude</option>
                    <option value="codex">▼ Codex</option>
                    <option value="copilot">▼ Copilot</option>
                </select>
            </div>

            <div class="control-group platform-model">
                <span class="control-label">MODEL:</span>
                <select id="modelSelect" onchange="updateStatusBar()">
                    <option value="gemini-pro-low">▼ Reasoning: Low, Effort: Low</option>
                    <option value="gemini-pro-medium">▼ Reasoning: Medium, Effort: Low</option>
                    <option value="gemini-pro-high" selected>▼ Reasoning: High, Effort: Med</option>
                    <option value="gemini-pro-extended">▼ Reasoning: Extended, Effort: High</option>
                </select>
            </div>

            <div class="control-group attach">
                <span class="control-label">ATTACH:</span>
                <button class="attach-btn" onclick="openAttachModal()">
                    ATTACH
                </button>
            </div>
        </div>

        <!-- Left Sidebar - History -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">HISTORY</div>
            </div>
            <div class="chat-list" id="chatList">
                <div class="chat-item active">
                    <div><strong>Project X Plan</strong></div>
                </div>
                <div class="chat-item">
                    <div><strong>Ideas</strong></div>
                </div>
                <div class="chat-item">
                    <div><strong>Code Review</strong></div>
                </div>
                <div class="chat-item">
                    <div><strong>Meeting Notes</strong></div>
                </div>
                <div class="chat-item">
                    <div><strong>New Feature</strong></div>
                </div>
            </div>
        </div>

        <!-- Right Main Area - Chat -->
        <div class="main-area">
            <div class="messages-area" id="messagesArea">
                <div class="message assistant">
                    <div class="message-content">
                        Hello! I'm ready to assist you. I'm currently in Plan mode using Gemini with high reasoning. How can I help you today?
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea 
                        id="messageInput" 
                        placeholder="Message"
                        onkeydown="handleKeyPress(event)"
                    ></textarea>
                    <button class="send-btn" onclick="sendMessage()">SEND</button>
                </div>
            </div>
        </div>
    </div>

    <!-- File Attachment Modal -->
    <div class="modal" id="attachModal">
        <div class="modal-content">
            <div class="modal-header">ATTACH FILES</div>
            <div class="modal-body">
                <label for="fileInput" class="file-upload-label">+ CHOOSE FILES</label>
                <input type="file" id="fileInput" multiple onchange="handleFileSelect(event)">
                <div class="file-list" id="fileListDisplay">
                    <div style="text-align: center; color: #666; padding: 20px;">No files attached</div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn" onclick="closeAttachModal()">CANCEL</button>
                <button class="modal-btn primary" onclick="confirmAttachments()">CONFIRM</button>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'plan';
        let attachedFiles = [];
        let crewEnabled = true;

        function setMode(mode, button) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
        }

        function toggleCrew(button) {
            crewEnabled = !crewEnabled;
            button.classList.toggle('active');
        }

        function updateModels() {
            const platform = document.getElementById('platformSelect').value;
            const modelSelect = document.getElementById('modelSelect');
            
            const modelOptions = {
                gemini: [
                    { value: 'gemini-pro-low', text: '▼ Reasoning: Low, Effort: Low' },
                    { value: 'gemini-pro-medium', text: '▼ Reasoning: Medium, Effort: Low' },
                    { value: 'gemini-pro-high', text: '▼ Reasoning: High, Effort: Med' },
                    { value: 'gemini-pro-extended', text: '▼ Reasoning: Extended, Effort: High' }
                ],
                cursor: [
                    { value: 'cursor-default-low', text: '▼ Reasoning: Low, Effort: Low' },
                    { value: 'cursor-default-medium', text: '▼ Reasoning: Medium, Effort: Med' },
                    { value: 'cursor-default-high', text: '▼ Reasoning: High, Effort: High' },
                    { value: 'cursor-default-extended', text: '▼ Reasoning: Extended, Effort: Max' }
                ],
                claude: [
                    { value: 'claude-3-opus-low', text: '▼ Reasoning: Low, Effort: Low' },
                    { value: 'claude-3-opus-medium', text: '▼ Reasoning: Medium, Effort: Med' },
                    { value: 'claude-3-opus-high', text: '▼ Reasoning: High, Effort: High' },
                    { value: 'claude-3-opus-extended', text: '▼ Reasoning: Extended, Effort: Max' }
                ],
                codex: [
                    { value: 'codex-davinci-low', text: '▼ Reasoning: Low, Effort: Low' },
                    { value: 'codex-davinci-medium', text: '▼ Reasoning: Medium, Effort: Med' },
                    { value: 'codex-davinci-high', text: '▼ Reasoning: High, Effort: High' },
                    { value: 'codex-davinci-extended', text: '▼ Reasoning: Extended, Effort: Max' }
                ],
                copilot: [
                    { value: 'copilot-default-low', text: '▼ Reasoning: Low, Effort: Low' },
                    { value: 'copilot-default-medium', text: '▼ Reasoning: Medium, Effort: Med' },
                    { value: 'copilot-default-high', text: '▼ Reasoning: High, Effort: High' },
                    { value: 'copilot-default-extended', text: '▼ Reasoning: Extended, Effort: Max' }
                ]
            };

            modelSelect.innerHTML = '';
            modelOptions[platform].forEach(option => {
                const opt = document.createElement('option');
                opt.value = option.value;
                opt.textContent = option.text;
                modelSelect.appendChild(opt);
            });
        }

        function updateStatusBar() {
            // Status bar removed, keeping function for compatibility
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;

            const messagesArea = document.getElementById('messagesArea');
            
            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.innerHTML = `
                <div class="message-content">${escapeHtml(message)}</div>
            `;
            messagesArea.appendChild(userMsg);

            input.value = '';

            setTimeout(() => {
                const assistantMsg = document.createElement('div');
                assistantMsg.className = 'message assistant';
                assistantMsg.innerHTML = `
                    <div class="message-content">I understand your request. I'm processing it in ${currentMode} mode with the configured reasoning level.</div>
                `;
                messagesArea.appendChild(assistantMsg);
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }, 1000);

            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function openAttachModal() {
            document.getElementById('attachModal').classList.add('active');
        }

        function closeAttachModal() {
            document.getElementById('attachModal').classList.remove('active');
        }

        function handleFileSelect(event) {
            const files = Array.from(event.target.files);
            attachedFiles = [...attachedFiles, ...files];
            updateFileList();
        }

        function updateFileList() {
            const fileListDisplay = document.getElementById('fileListDisplay');
            
            if (attachedFiles.length === 0) {
                fileListDisplay.innerHTML = '<div style="text-align: center; color: #666; padding: 20px;">No files attached</div>';
            } else {
                fileListDisplay.innerHTML = attachedFiles.map((file, index) => `
                    <div class="file-item">
                        <span>${escapeHtml(file.name)} (${formatFileSize(file.size)})</span>
                        <button class="remove-file" onclick="removeFile(${index})">REMOVE</button>
                    </div>
                `).join('');
            }
        }

        function removeFile(index) {
            attachedFiles.splice(index, 1);
            updateFileList();
        }

        function confirmAttachments() {
            closeAttachModal();
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            else if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            else return (bytes / 1048576).toFixed(1) + ' MB';
        }

        document.querySelectorAll('.chat-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });

        document.getElementById('platformSelect').addEventListener('change', updateStatusBar);
        document.getElementById('modelSelect').addEventListener('change', updateStatusBar);
    </script>
</body>
</html>
