# nfpm.yaml - build .deb/.rpm installers for rwm-puppet-master
#
# Notes:
# - nFPM does not support templating; we use environment variable expansion.
# - The build script sets:
#   - PM_VERSION: package version (e.g. 0.1.0)
#   - PM_ARCH: nfpm arch (e.g. amd64)
#   - PM_NFPM_ROOT: absolute path to a prepared rootfs directory
#     containing:
#       ${PM_NFPM_ROOT}/opt/puppet-master/...
#       ${PM_NFPM_ROOT}/usr/bin/puppet-master
#
# Schema reference: https://nfpm.goreleaser.com/schema.json

# IMPORTANT: Package name is "rwm-puppet-master" to avoid conflict with
# the Puppetlabs "puppet-master" package (puppet config management system).
name: rwm-puppet-master
arch: ${PM_ARCH}
platform: linux
version: ${PM_VERSION}
version_schema: semver
release: "1"
section: utils
priority: optional
maintainer: "RWM Puppet Master <devnull@example.com>"
description: |
  RWM Puppet Master - CLI orchestrator for AI development workflows.
  (Not related to Puppetlabs Puppet configuration management)

# Dependencies removed - binary uses Iced (pure Rust GUI) with minimal system deps
# The binary is dynamically linked with glibc but GTK/WebKit are NOT used
# Only basic system libraries needed (glibc, X11, etc) which are always present
depends: []

conflicts:
  - puppet-master
replaces:
  - puppet-master

contents:
  - src: ${PM_NFPM_ROOT}/opt/puppet-master
    dst: /opt/puppet-master
    type: tree
    expand: true

  - src: ${PM_NFPM_ROOT}/usr/bin/puppet-master
    dst: /usr/bin/puppet-master
    expand: true
    file_info:
      mode: 0755
      owner: root
      group: root

  - src: ${PM_NFPM_ROOT}/usr/bin/puppet-master-gui
    dst: /usr/bin/puppet-master-gui
    expand: true
    file_info:
      mode: 0755
      owner: root
      group: root

  # P2-G10: systemd service file for GUI server
  - src: installer/linux/systemd/puppet-master-gui.service
    dst: /usr/lib/systemd/system/puppet-master-gui.service
    file_info:
      mode: 0644
      owner: root
      group: root

  # Desktop entry for app menu
  - src: installer/linux/applications/com.rwm.puppet-master.desktop
    dst: /usr/share/applications/com.rwm.puppet-master.desktop
    file_info:
      mode: 0644
      owner: root
      group: root
  # Autostart entry for desktop environments
  - src: installer/linux/autostart/puppet-master-gui.desktop
    dst: /etc/xdg/autostart/puppet-master-gui.desktop
    file_info:
      mode: 0644
      owner: root
      group: root

# P0-G23: Post-install guidance
scripts:
  preinstall: installer/linux/scripts/preinstall
  postinstall: installer/linux/scripts/postinstall
