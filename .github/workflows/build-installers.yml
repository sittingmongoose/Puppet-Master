name: Build installers
# Build and test Rust/Iced installers for all platforms

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform_tag: win32-x64
          - os: macos-14
            platform_tag: darwin-arm64
          - os: ubuntu-latest
            platform_tag: linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './puppet-master-rs -> target'

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libgdk-pixbuf-2.0-dev \
            libatk1.0-dev \
            libatk-bridge2.0-dev \
            libappindicator3-dev \
            libx11-dev \
            libxext-dev \
            libxrender-dev \
            libxinerama-dev \
            libxi-dev \
            libxrandr-dev \
            libxdamage-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxkbcommon-dev \
            libwayland-dev \
            wayland-protocols \
            libdbus-1-dev \
            libssl-dev \
            dpkg \
            rpm

      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        uses: negrutiu/nsis-install@v2
        with:
          distro: 'official'
          arch: 'x86'

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version' puppet-master-rs/Cargo.toml | head -1 | cut -d'"' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version: $VERSION"

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd puppet-master-rs
          cargo build --release
          cd ../installer/windows
          makensis /DVERSION="${{ steps.version.outputs.version }}" puppet-master.nsi
          mkdir -p ../../dist/installers/win32-x64
          Copy-Item "RWM-Puppet-Master-${{ steps.version.outputs.version }}-setup.exe" -Destination "../../dist/installers/win32-x64/"

      - name: Build installer (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          PM_MAC_UNIVERSAL: "0"
        run: |
          rustup target add aarch64-apple-darwin
          cd installer/macos
          ./build-dmg.sh "${{ steps.version.outputs.version }}"
          mkdir -p ../../dist/installers/darwin-arm64
          cp "RWM-Puppet-Master-${{ steps.version.outputs.version }}.dmg" ../../dist/installers/darwin-arm64/

      - name: Build installer (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd scripts
          ./build-linux-installer.sh "${{ steps.version.outputs.version }}"
          mkdir -p ../dist/installers/linux-x64
          cp ../installer/linux/*.deb ../dist/installers/linux-x64/
          cp ../installer/linux/*.rpm ../dist/installers/linux-x64/ 2>/dev/null || true

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "dist/installers/win32-x64" -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) { throw "Installer not found" }
          Write-Host "Running installer: $($installer.FullName)"
          Start-Process -FilePath $installer.FullName -ArgumentList "/S" -Wait
          $pm = Join-Path $Env:ProgramFiles "RWM Puppet Master\puppet-master.exe"
          if (-not (Test-Path $pm)) { throw "puppet-master not found at $pm" }
          & $pm --version

      - name: Smoke test (macOS)
        if: runner.os == 'macOS'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          OUT_DIR="dist/installers/darwin-arm64"
          dmg="$(find "$OUT_DIR" -maxdepth 1 -name '*.dmg' 2>/dev/null | head -n 1)"
          if [ -z "$dmg" ] || [ ! -f "$dmg" ]; then
            echo "::error::No DMG found in $OUT_DIR"
            ls -la "$OUT_DIR" 2>/dev/null || true
            exit 1
          fi
          echo "Mounting DMG: $dmg"
          mount_dir="$(mktemp -d)"
          hdiutil attach "$dmg" -mountpoint "$mount_dir" -nobrowse
          app="$(find "$mount_dir" -maxdepth 1 -name '*.app' 2>/dev/null | head -n 1)"
          if [ -z "$app" ] || [ ! -d "$app" ]; then
            hdiutil detach "$mount_dir" 2>/dev/null || true
            echo "::error::No .app found inside DMG"
            exit 1
          fi
          echo "Verifying .app bundle: $app"
          hdiutil detach "$mount_dir"
          echo "macOS smoke test passed (DMG verified)."

      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          deb="$(ls -1 dist/installers/linux-x64/*.deb 2>/dev/null | head -n 1)"
          if [ -z "$deb" ]; then
            echo "::error::No .deb found"
            ls -la dist/installers/linux-x64/ 2>/dev/null || true
            exit 1
          fi
          echo "Installing DEB: $deb"
          sudo dpkg -i "$deb"
          /usr/bin/puppet-master --version
          echo "Linux smoke test passed."

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: dist/installers/**/*
