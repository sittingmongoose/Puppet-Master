name: Build installers
# Build and test installers for all platforms

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_script: build:win:tauri
          - os: macos-14
            build_script: build:mac:tauri
          - os: ubuntu-latest
            build_script: build:linux:tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust (Tauri)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        env:
          npm_config_update_notifier: "false"
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Build GUI
        run: |
          npm --prefix src/gui/react ci
          npm run gui:build

      - name: Install WebView2 SDK (Windows for Tauri)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Download and extract WebView2 SDK for Tauri compilation
          $sdkUrl = "https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2/1.0.2592.51"
          $sdkZip = "$env:TEMP\webview2.zip"
          $sdkDir = "$env:TEMP\webview2-sdk"
          Write-Host "Downloading WebView2 SDK..."
          Invoke-WebRequest -Uri $sdkUrl -OutFile $sdkZip
          Expand-Archive -Path $sdkZip -DestinationPath $sdkDir -Force
          # Set environment variable for Tauri build
          $libPath = "$sdkDir\build\native\x64"
          echo "WEBVIEW2_LIB_PATH=$libPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "WebView2 SDK installed at: $sdkDir"

      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        uses: negrutiu/nsis-install@v2
        with:
          distro: 'official'
          arch: 'x86'

      - name: Install Go (Linux for nfpm)
        if: runner.os == 'Linux'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: false  # No go.sum in this project - Go only used to install nfpm

      - name: Install nfpm (Linux)
        if: runner.os == 'Linux'
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          nfpm --version

      - name: Build installer
        run: npm run ${{ matrix.build_script }}

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "dist/installers/win32-x64" -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) { throw "Installer not found" }
          Write-Host "Running installer: $($installer.FullName)"
          Start-Process -FilePath $installer.FullName -ArgumentList "/S" -Wait
          $pm = Join-Path $Env:ProgramFiles "Puppet Master\\bin\\puppet-master.cmd"
          if (-not (Test-Path $pm)) { throw "puppet-master not found at $pm" }
          & $pm --version
          # Doctor command may fail due to quota/config issues in CI - just log output
          & $pm doctor --category runtime --json
          if ($LASTEXITCODE -ne 0) { Write-Host "Doctor check had issues (expected in CI, exit code: $LASTEXITCODE)" }
          exit 0

      - name: Smoke test (macOS)
        if: runner.os == 'macOS'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          dmg="$(ls -1 dist/installers/darwin-arm64/*.dmg | head -n 1)"
          echo "Mounting DMG: $dmg"
          mount_dir="$(mktemp -d)"
          hdiutil attach "$dmg" -mountpoint "$mount_dir" -nobrowse
          pkg="$(ls -1 "$mount_dir"/*.pkg | head -n 1)"
          echo "Installing PKG: $pkg"
          sudo installer -pkg "$pkg" -target /
          hdiutil detach "$mount_dir"
          # CLI is inside the app bundle
          pm_cli="/Applications/Puppet Master.app/Contents/Resources/puppet-master/bin/puppet-master"
          if [ ! -x "$pm_cli" ]; then
            echo "::warning::CLI not found at $pm_cli (smoke test non-blocking)"
            ls -la "/Applications/Puppet Master.app/Contents/Resources/" 2>/dev/null || true
            exit 0
          fi
          "$pm_cli" --version || true
          "$pm_cli" doctor --category runtime --json 2>/dev/null || echo "Doctor check skipped (expected in CI)"

      - name: Smoke test GUI launch (macOS)
        if: runner.os == 'macOS'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          ROOT="/Applications/Puppet Master.app/Contents/Resources/puppet-master"
          export PATH="$ROOT/node/bin:$PATH"
          export PLAYWRIGHT_BROWSERS_PATH="$ROOT/playwright-browsers"
          cd ~
          "$ROOT/bin/puppet-master" gui --no-open &
          GUI_PID=$!
          for i in $(seq 1 15); do
            sleep 1
            if lsof -i :3847 >/dev/null 2>&1; then
              echo "GUI server started on port 3847"
              kill $GUI_PID 2>/dev/null || true
              exit 0
            fi
          done
          echo "::warning::GUI did not start within 15s (known issue, see ~/.puppet-master/logs/)"
          cat ~/.puppet-master/logs/gui.log 2>/dev/null || true
          cat ~/.puppet-master/logs/crash.log 2>/dev/null || true
          kill $GUI_PID 2>/dev/null || true
          exit 0

      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          deb="$(ls -1 dist/installers/linux-x64/*.deb | head -n 1)"
          rpm="$(ls -1 dist/installers/linux-x64/*.rpm | head -n 1)"
          echo "Installing DEB: $deb"
          sudo dpkg -i "$deb"
          /usr/bin/puppet-master --version
          # Doctor command may fail due to quota/config issues in CI - just log output
          /usr/bin/puppet-master doctor --category runtime --json || echo "Doctor check had issues (expected in CI)"
          echo "RPM artifact exists: $rpm"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: dist/installers/**/*

