name: Build installers
# Build and test Rust/Iced installers for all platforms

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      LINUX_DEPS: /home/runner/.cache/rwm-upstream
      MUSL_VERSION: 1.2.5
      GTK_VERSION: 3.24.48
      RPM_VERSION: 6.0.1
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform_tag: win32-x64
          - os: macos-14
            platform_tag: darwin-arm64
          - os: ubuntu-latest
            platform_tag: linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './puppet-master-rs -> target'

      - name: Compute cache bucket (Linux)
        if: runner.os == 'Linux'
        id: cache-bucket
        shell: bash
        run: |
          echo "bucket=$(( $(date +%s) / 1209600 ))" >> "$GITHUB_OUTPUT"

      - name: Restore upstream deps cache (Linux)
        if: runner.os == 'Linux'
        id: linux-deps-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.LINUX_DEPS }}
          key: rwm-upstream-${{ runner.os }}-${{ steps.cache-bucket.outputs.bucket }}-musl${{ env.MUSL_VERSION }}-gtk${{ env.GTK_VERSION }}-rpm${{ env.RPM_VERSION }}
          restore-keys: |
            rwm-upstream-${{ runner.os }}-

      - name: Install upstream musl/gtk/rpm (Linux)
        if: runner.os == 'Linux' && steps.linux-deps-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            curl \
            xz-utils \
            bison \
            flex \
            gettext \
            meson \
            ninja-build \
            python3 \
            python3-pip \
            libarchive-dev \
            libbz2-dev \
            liblzma-dev \
            libpopt-dev \
            libsqlite3-dev \
            libzstd-dev \
            libgcrypt20-dev \
            liblua5.4-dev \
            zlib1g-dev \
            libssl-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libgdk-pixbuf-2.0-dev \
            libatk1.0-dev \
            libatk-bridge2.0-dev \
            libepoxy-dev \
            libx11-dev \
            libxext-dev \
            libxrender-dev \
            libxinerama-dev \
            libxi-dev \
            libxrandr-dev \
            libxdamage-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxkbcommon-dev \
            libwayland-dev \
            wayland-protocols \
            libdbus-1-dev \
            libmount-dev

          mkdir -p "$LINUX_DEPS"

          echo "Installing musl ${MUSL_VERSION}..."
          curl -fL "https://musl.libc.org/releases/musl-${MUSL_VERSION}.tar.gz" -o "/tmp/musl-${MUSL_VERSION}.tar.gz"
          tar -xzf "/tmp/musl-${MUSL_VERSION}.tar.gz" -C /tmp
          pushd "/tmp/musl-${MUSL_VERSION}"
          ./configure --prefix="${LINUX_DEPS}/musl-${MUSL_VERSION}"
          make -j"$(nproc)"
          make install
          popd

          echo "Installing GTK ${GTK_VERSION}..."
          curl -fL "https://download.gnome.org/sources/gtk/3.24/gtk-${GTK_VERSION}.tar.xz" -o "/tmp/gtk-${GTK_VERSION}.tar.xz"
          tar -xJf "/tmp/gtk-${GTK_VERSION}.tar.xz" -C /tmp
          pushd "/tmp/gtk-${GTK_VERSION}"
          meson setup build --prefix="${LINUX_DEPS}/gtk-${GTK_VERSION}" -Dintrospection=disabled
          meson compile -C build
          meson install -C build
          popd

          echo "Installing rpm ${RPM_VERSION}..."
          curl -fL "https://ftp.rpm.org/releases/rpm-${RPM_VERSION%%.*}.0.x/rpm-${RPM_VERSION}.tar.bz2" -o "/tmp/rpm-${RPM_VERSION}.tar.bz2"
          tar -xjf "/tmp/rpm-${RPM_VERSION}.tar.bz2" -C /tmp
          pushd "/tmp/rpm-${RPM_VERSION}"
          ./configure --prefix="${LINUX_DEPS}/rpm-${RPM_VERSION}"
          make -j"$(nproc)"
          make install
          popd

      - name: Save upstream deps cache (Linux)
        if: runner.os == 'Linux' && steps.linux-deps-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.LINUX_DEPS }}
          key: rwm-upstream-${{ runner.os }}-${{ steps.cache-bucket.outputs.bucket }}-musl${{ env.MUSL_VERSION }}-gtk${{ env.GTK_VERSION }}-rpm${{ env.RPM_VERSION }}

      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        uses: negrutiu/nsis-install@v2
        with:
          distro: 'official'
          arch: 'x86'

      - name: Get version (Unix)
        if: runner.os != 'Windows'
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version' puppet-master-rs/Cargo.toml | head -1 | cut -d'"' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version: $VERSION"

      - name: Get version (Windows)
        if: runner.os == 'Windows'
        id: version
        shell: pwsh
        run: |
          $line = Get-Content puppet-master-rs/Cargo.toml | Where-Object { $_ -match '^version\\s*=' } | Select-Object -First 1
          if (-not $line) { throw "version not found in Cargo.toml" }
          $version = ($line -split '"')[1]
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Using version: $version"

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd puppet-master-rs
          cargo build --release
          cd ../installer/windows
          makensis /DVERSION="${{ steps.version.outputs.version }}" puppet-master.nsi
          mkdir -p ../../dist/installers/win32-x64
          Copy-Item "RWM-Puppet-Master-${{ steps.version.outputs.version }}-setup.exe" -Destination "../../dist/installers/win32-x64/"

      - name: Build installer (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          PM_MAC_UNIVERSAL: "0"
        run: |
          rustup target add aarch64-apple-darwin
          cd installer/macos
          ./build-dmg.sh "${{ steps.version.outputs.version }}"
          mkdir -p ../../dist/installers/darwin-arm64
          cp "RWM-Puppet-Master-${{ steps.version.outputs.version }}.dmg" ../../dist/installers/darwin-arm64/

      - name: Build installer (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          export PATH="$LINUX_DEPS/rpm-${RPM_VERSION}/bin:$LINUX_DEPS/gtk-${GTK_VERSION}/bin:$LINUX_DEPS/musl-${MUSL_VERSION}/bin:$PATH"
          export PKG_CONFIG_PATH="$LINUX_DEPS/gtk-${GTK_VERSION}/lib/pkgconfig:$LINUX_DEPS/gtk-${GTK_VERSION}/share/pkgconfig:${PKG_CONFIG_PATH:-}"
          export LD_LIBRARY_PATH="$LINUX_DEPS/gtk-${GTK_VERSION}/lib:$LINUX_DEPS/rpm-${RPM_VERSION}/lib:${LD_LIBRARY_PATH:-}"
          rustup target add x86_64-unknown-linux-musl
          cd scripts
          ./build-linux-installer.sh "${{ steps.version.outputs.version }}"
          mkdir -p ../dist/installers/linux-x64
          cp ../installer/linux/*.deb ../dist/installers/linux-x64/
          cp ../installer/linux/*.rpm ../dist/installers/linux-x64/ 2>/dev/null || true

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "dist/installers/win32-x64" -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) { throw "Installer not found" }
          Write-Host "Running installer: $($installer.FullName)"
          Start-Process -FilePath $installer.FullName -ArgumentList "/S" -Wait
          $pm = Join-Path $Env:ProgramFiles "RWM Puppet Master\puppet-master.exe"
          if (-not (Test-Path $pm)) { throw "puppet-master not found at $pm" }
          & $pm --version

      - name: Smoke test (macOS)
        if: runner.os == 'macOS'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          OUT_DIR="dist/installers/darwin-arm64"
          dmg="$(find "$OUT_DIR" -maxdepth 1 -name '*.dmg' 2>/dev/null | head -n 1)"
          if [ -z "$dmg" ] || [ ! -f "$dmg" ]; then
            echo "::error::No DMG found in $OUT_DIR"
            ls -la "$OUT_DIR" 2>/dev/null || true
            exit 1
          fi
          echo "Mounting DMG: $dmg"
          mount_dir="$(mktemp -d)"
          hdiutil attach "$dmg" -mountpoint "$mount_dir" -nobrowse
          app="$(find "$mount_dir" -maxdepth 1 -name '*.app' 2>/dev/null | head -n 1)"
          if [ -z "$app" ] || [ ! -d "$app" ]; then
            hdiutil detach "$mount_dir" 2>/dev/null || true
            echo "::error::No .app found inside DMG"
            exit 1
          fi
          echo "Verifying .app bundle: $app"
          hdiutil detach "$mount_dir"
          echo "macOS smoke test passed (DMG verified)."

      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          deb="$(ls -1 dist/installers/linux-x64/*.deb 2>/dev/null | head -n 1)"
          if [ -z "$deb" ]; then
            echo "::error::No .deb found"
            ls -la dist/installers/linux-x64/ 2>/dev/null || true
            exit 1
          fi
          echo "Installing DEB: $deb"
          sudo dpkg -i "$deb"
          /usr/bin/puppet-master --version
          echo "Linux smoke test passed."

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: dist/installers/**/*
